# Packaged built-in flow: deep_research.
# Canonical version.
#
# ----------------------------------------------------------------------------------------------------
# Per-node tuning (ALL fields below are OPTIONAL — omit one to inherit the default). Every
# agent/evaluator node carries the provider/model/reasoning slots commented out so the full
# configuration surface is visible; uncomment and edit to pin a single node.
#   agent + evaluator nodes:
#     provider:  codex | claude            which agent runs the node (∈ agents.allowed); default: global primary
#     model:     <model id>                overrides agents.providers.<provider>.model for THIS node
#     reasoning: minimal|low|medium|high|xhigh|max  default: agents.providers.<provider>.reasoning
#     network_access: true | false         per-node network grant/deny; default: flow network_policy (research)
#   agent nodes also: timeout_seconds, extra_args, best_effort, permission_profile (≤ flow ceiling), when
#   evaluator nodes also: blocking, max_rework_per_stage
#   Disabling a node is PER-TASK: set `nodes.<id>.enabled: false` in the task file.
#   Full reference: docs/configuration.md → "Per-node overrides in flows".
# ----------------------------------------------------------------------------------------------------
flow:
  name: deep_research
  task_type: deep_research
  permission_ceiling: workspace-write
  output_policy: repository_document
  publishing: documentation_pull_request
  network_policy: research

  defaults:
    evaluator: { session_scope: fresh_disposable, permission_profile: read-only }

  nodes:
    - id: refinement
      kind: agent
      role_file: deep_research/refinement.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: false
      hitl: { allow_question: true, allow_approval: false }
      when: { fact: derived.needs_refinement }
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: repository_analysis
      kind: agent
      role_file: deep_research/repository_analysis.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: false
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: external_research
      kind: agent
      role_file: deep_research/external_research.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: true
      when: { fact: config.external_research }
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # timeout_seconds: 7200
      # network_access: true
      # extra_args: []
    - id: architecture_design
      kind: agent
      role_file: deep_research/architecture_design.md
      session_scope: fresh_disposable
      permission_profile: workspace-write
      network_access: false
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: xhigh
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: synthesis
      kind: agent
      role_file: deep_research/synthesis.md
      session_scope: fresh_disposable
      permission_profile: workspace-write
      network_access: false
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: citation_check
      kind: checks
      checker: citation
    - id: fact_verification
      kind: evaluator
      role: verifier
      role_file: deep_research/verifier.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: true
      blocking: false
      max_rework_per_stage: 1
      # optional overrides (uncomment to pin this evaluator):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # network_access: true
    - id: critical_review
      kind: evaluator
      role: critic
      role_file: deep_research/critic.md
      session_scope: resume_own_lineage
      permission_profile: read-only
      network_access: true
      blocking: false
      max_rework_per_stage: 3
      # optional overrides (uncomment to pin this evaluator):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: xhigh
      # network_access: true
    - id: publish
      kind: publish
      policy: documentation_pull_request

  edges:
    - { from: refinement, to: repository_analysis }
    - { from: repository_analysis, to: external_research }
    - { from: external_research, to: architecture_design }
    - { from: architecture_design, to: synthesis }
    - { from: synthesis, to: citation_check }
    - { from: citation_check, to: fact_verification, outcome: pass }
    - { from: citation_check, to: synthesis, outcome: fail, budget: 1 }
    - { from: fact_verification, to: critical_review, outcome: accept }
    - { from: fact_verification, to: synthesis, outcome: rework, budget: 2 }
    - { from: critical_review, to: publish, outcome: accept }
    - { from: critical_review, to: synthesis, outcome: rework, budget: 3 }

  budgets:
    global_fix_iterations: 12
