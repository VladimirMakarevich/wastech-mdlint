# Packaged built-in flow: implementation — the executable default flow the engine drives.
#
# The pipeline expressed as data: planning -> implementation -> testing(checks) ->
# review(evaluator) -> documentation -> publish, with the two fix loops (through fixing) and
# decomposition. After review accepts the code, `documentation` updates the target project's docs to
# match the change just shipped (workspace-write, resuming the implementation editing lineage), and
# its edits join the same diff the orchestrator commits. Refinement is removed from this flow
# entirely (this operator drives already-refined task files); any node can still be disabled per task
# via `nodes.<id>.enabled: false` (driven by node id, not a `when` fact — the bounded per-task
# exception, PRE.3).
#
# Layered on across P2: durable sessions (P2.2 `editing_lineage`), review-as-evaluator (P2.3), and
# the core-owned commit-candidate mutation guard on `checks` (P2.4 — active whenever a `checks` node
# is present, not declared here). An optional non-blocking `testing_quality` evaluator (the shared
# evaluator runner already supports its self-cap) is NOT shipped in this default flow: it is a pure
# graph-shape choice — an operator who wants it adds the node to their own flow YAML.
#
# NOTE: the supervisor is NOT a graph node. It is a constant orchestrator layer ABOVE any flow
# (summary + per-step advisory oversight, configured in config.yaml: supervisor). There is NO
# `summary` node here: the constant supervisor layer writes the summary at whole-task close (before
# publish) and observes every completed step.
#
# ----------------------------------------------------------------------------------------------------
# Per-node tuning (ALL fields below are OPTIONAL — omit one to inherit the default). Every
# agent/evaluator node in this flow carries the provider/model/reasoning slots commented out so the
# full configuration surface is visible; uncomment and edit to pin a single node.
#   agent + evaluator nodes:
#     provider:  codex | claude            which agent runs the node (∈ agents.allowed); default: global primary
#     model:     <model id>                overrides agents.providers.<provider>.model for THIS node
#     reasoning: minimal|low|medium|high|xhigh|max  default: agents.providers.<provider>.reasoning
#     network_access: true | false         per-node network grant/deny; default: flow network_policy
#   agent nodes also: timeout_seconds, extra_args (extra CLI flags), best_effort,
#                     permission_profile (≤ flow permission_ceiling), when
#   evaluator nodes also: blocking (failing verdict blocks vs advisory), max_rework_per_stage
#   Disabling a node is PER-TASK, not here: set `nodes.<id>.enabled: false` in the task file.
#   Full reference: docs/configuration.md → "Per-node overrides in flows".
# ----------------------------------------------------------------------------------------------------
flow:
  name: implementation
  task_type: implementation
  permission_ceiling: workspace-write
  output_policy: code_change
  publishing: pull_request

  nodes:
    - id: planning
      kind: agent
      role_file: implementation/planning.md
      session_scope: fresh_disposable
      permission_profile: read-only
      output_artifact: plan
      hitl: { allow_question: true, allow_approval: true }
      provider: claude
      model: claude-sonnet-5
      reasoning: max
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: implementation
      kind: agent
      role_file: implementation/implementation.md
      permission_profile: workspace-write
      session_scope: fresh_disposable
      provider: codex
      model: gpt-5.4
      reasoning: xhigh
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
      # best_effort: false
    - id: testing
      kind: checks
      checker: command_profile
    - id: review
      kind: evaluator
      role: review
      role_file: implementation/review.md
      session_scope: fresh_disposable
      permission_profile: read-only
      provider: claude
      model: claude-opus-4-8
      reasoning: high
      # network_access: false
      # blocking: true
      # max_rework_per_stage: 1
    - id: fixing
      kind: agent
      role_file: implementation/fixing.md
      session_scope: fresh_disposable
      permission_profile: workspace-write
      provider: codex
      model: gpt-5.4
      reasoning: high
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: documentation
      kind: agent
      role_file: implementation/documentation.md
      session_scope: fresh_disposable
      permission_profile: workspace-write
      reasoning: low
      provider: claude
      model: claude-sonnet-5
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: publish
      kind: publish
      policy: pull_request

  edges:
    - { from: planning, to: implementation }
    - { from: implementation, to: testing }
    - { from: testing, to: review, outcome: pass }
    - { from: testing, to: fixing, outcome: fail, loop: test_fix }
    - { from: review, to: documentation, outcome: accept } # accepted code -> docs update -> publish
    - { from: review, to: fixing, outcome: rework, loop: review_fix }
    - { from: fixing, to: testing }
    - { from: documentation, to: publish } # whole-task summary + advisory oversight = supervisor layer

  budgets:
    global_fix_iterations: 30
    test_fix: 15
    review_fix: 15

  # Flow-local supervisor prompts + the tech-debt/follow-ups opt-in (prompt-and-supervisor ADR). The
  # supervisor is a constant layer above the flow, not a node; this block only reshapes ITS wording
  # (the structured-output schemas stay in code). `role_file` overrides the global observe lens;
  # `finalize_role_file` is the final-summary emphasis; `emit_follow_ups` opts the finalize turn into
  # the evidence-gated `follow_ups` array (a code-oriented capability — research/prose flows omit it).
  supervisor:
    role_file: implementation/supervisor.md
    finalize_role_file: implementation/summary.md
    emit_follow_ups: true

  decomposition:
    proposed_by: planning
    sub_flow: [implementation, testing, review, fixing]
    shared_budget: global_fix_iterations
