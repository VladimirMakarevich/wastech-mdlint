# Packaged built-in flow: security_audit.
# Canonical version.
#
# ----------------------------------------------------------------------------------------------------
# Per-node tuning (ALL fields below are OPTIONAL — omit one to inherit the default). Every
# agent/evaluator node carries the provider/model/reasoning slots commented out so the full
# configuration surface is visible; uncomment and edit to pin a single node.
#   agent + evaluator nodes:
#     provider:  codex | claude            which agent runs the node (∈ agents.allowed); default: global primary
#     model:     <model id>                overrides agents.providers.<provider>.model for THIS node
#     reasoning: minimal|low|medium|high|xhigh|max  default: agents.providers.<provider>.reasoning
#     network_access: true | false         per-node network grant/deny; default: flow network_policy (advisories)
#   agent nodes also: timeout_seconds, extra_args, best_effort, permission_profile (≤ flow ceiling), when
#   evaluator nodes also: blocking, max_rework_per_stage
#   Disabling a node is PER-TASK: set `nodes.<id>.enabled: false` in the task file.
#   Full reference: docs/configuration.md → "Per-node overrides in flows".
# ----------------------------------------------------------------------------------------------------
flow:
  name: security_audit
  task_type: security_audit
  permission_ceiling: workspace-write
  output_policy: private_control_workspace_report
  publishing: none
  network_policy: advisories

  defaults:
    evaluator: { session_scope: fresh_disposable, permission_profile: read-only }

  nodes:
    - id: scope
      kind: agent
      role_file: security_audit/scope.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: false
      hitl: { allow_question: true, allow_approval: false }
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: repository_analysis
      kind: agent
      role_file: security_audit/repository_analysis.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: false
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: dependency_scan
      kind: checks
      checker: dependency_scan
    - id: threat_analysis
      kind: agent
      role_file: security_audit/threat_analysis.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: true
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: xhigh
      # timeout_seconds: 7200
      # network_access: true
      # extra_args: []
    - id: finding_verification
      kind: evaluator
      role: verifier
      role_file: security_audit/verifier.md
      session_scope: fresh_disposable
      permission_profile: read-only
      network_access: true
      blocking: false
      max_rework_per_stage: 2
      # optional overrides (uncomment to pin this evaluator):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: high
      # network_access: true
    - id: report
      kind: agent
      role_file: security_audit/report.md
      session_scope: fresh_disposable
      permission_profile: workspace-write
      network_access: false
      # optional overrides (uncomment to pin this node):
      # provider: claude
      # model: claude-opus-4-8
      # reasoning: medium
      # timeout_seconds: 7200
      # network_access: false
      # extra_args: []
    - id: private_storage
      kind: publish
      policy: private_control_workspace_report

  edges:
    - { from: scope, to: repository_analysis }
    - { from: repository_analysis, to: dependency_scan }
    - { from: dependency_scan, to: threat_analysis, outcome: pass }
    - { from: threat_analysis, to: finding_verification }
    - { from: finding_verification, to: report, outcome: accept }
    - { from: finding_verification, to: threat_analysis, outcome: rework, budget: 2 }
    - { from: report, to: private_storage }

  budgets:
    global_fix_iterations: 8
